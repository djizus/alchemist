<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alchemist — PoC V0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08070f;color:#d4c9a8;font-family:'Crimson Text',serif;overflow:hidden;height:100vh;width:100vw;}
#app{display:grid;grid-template-rows:56px 1fr 90px;grid-template-columns:220px 1fr 260px;height:100vh;width:100vw;gap:0;}

/* Top Bar */
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:linear-gradient(180deg,#141024 0%,#0d0b18 100%);border-bottom:1px solid #2a2245;}
.topbar h1{font-family:'Cinzel',serif;font-size:18px;color:#c4a44a;letter-spacing:4px;text-transform:uppercase;}
.topbar .gold{display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:16px;color:#ffd700;}
.topbar .gold span{font-size:20px;}
.topbar .session-info{font-size:13px;color:#6a6280;font-style:italic;}
.topbar .grimoire-progress{font-family:'Cinzel',serif;font-size:14px;color:#8b7ec8;}

/* Left Panel - Grimoire */
.grimoire-panel{background:#0c0a16;border-right:1px solid #1e1a30;padding:12px;overflow-y:auto;display:flex;flex-direction:column;}
.grimoire-panel h2{font-family:'Cinzel',serif;font-size:13px;color:#7b6fa0;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;text-align:center;}
.grimoire-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1;align-content:start;}
.grimoire-slot{background:#13101e;border:1px solid #1e1a30;border-radius:4px;padding:6px 5px;text-align:center;font-size:11px;min-height:40px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.grimoire-slot.discovered{background:linear-gradient(135deg,#1a1530,#1e1840);border-color:#3a2d6a;color:#b8a8e0;text-shadow:0 0 8px rgba(140,100,255,0.3);}
.grimoire-slot.unknown{color:#2a2540;font-size:14px;font-weight:bold;}
.grimoire-slot.just-found{animation:potionGlow 1.5s ease;border-color:#c4a44a;box-shadow:0 0 12px rgba(196,164,74,0.4);}
@keyframes potionGlow{0%{box-shadow:0 0 20px rgba(196,164,74,0.8);transform:scale(1.1);}100%{box-shadow:0 0 4px rgba(196,164,74,0.1);transform:scale(1);}}

/* Center - Phaser Canvas */
.center-area{position:relative;overflow:hidden;background:#08070f;}
.center-area canvas{width:100%!important;height:100%!important;}

/* Right Panel - Crafting */
.craft-panel{background:#0c0a16;border-left:1px solid #1e1a30;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.craft-panel h2{font-family:'Cinzel',serif;font-size:13px;color:#7b6fa0;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.craft-slots{display:flex;flex-direction:column;gap:6px;margin:6px 0;}
.craft-slot{background:#13101e;border:1px solid #1e1a30;border-radius:4px;padding:8px;display:flex;align-items:center;justify-content:space-between;font-size:13px;min-height:38px;}
.craft-slot select{background:#1a1530;color:#d4c9a8;border:1px solid #2a2245;border-radius:3px;padding:4px 6px;font-family:'Crimson Text',serif;font-size:13px;width:100%;cursor:pointer;}
.craft-slot select option{background:#1a1530;color:#d4c9a8;}
.craft-btn{background:linear-gradient(135deg,#3a2580,#5a35a0);color:#e8dcc0;border:1px solid #6a45b0;border-radius:5px;padding:10px;font-family:'Cinzel',serif;font-size:14px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;text-align:center;}
.craft-btn:hover{background:linear-gradient(135deg,#4a35a0,#7a55c0);box-shadow:0 0 15px rgba(100,60,200,0.3);}
.craft-btn:disabled{opacity:0.3;cursor:not-allowed;}
.craft-result{text-align:center;padding:8px;font-size:13px;border-radius:4px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.craft-result.success{background:#1a2518;border:1px solid #2a5530;color:#7ae070;}
.craft-result.fail{background:#251818;border:1px solid #552a2a;color:#e07070;}
.craft-result.empty{background:transparent;border:1px solid transparent;color:#3a3555;}
.inv-section{margin-top:4px;}
.inv-section h3{font-family:'Cinzel',serif;font-size:11px;color:#5a5070;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.inv-grid{display:flex;flex-direction:column;gap:3px;}
.inv-item{display:flex;justify-content:space-between;font-size:12px;padding:3px 6px;border-radius:3px;background:#0f0d1a;}
.inv-item .name{color:#a898c8;}
.inv-item .count{color:#d4c9a8;font-weight:600;}
.inv-item.tier-common .name{color:#8aaa80;}
.inv-item.tier-rare .name{color:#70a0d0;}
.inv-item.tier-epic .name{color:#c080e0;}

/* Bottom - Heroes */
.hero-bar{grid-column:1/-1;background:#0e0c18;border-top:1px solid #1e1a30;display:flex;align-items:center;padding:8px 16px;gap:12px;}
.hero-card{background:#13101e;border:1px solid #1e1a30;border-radius:6px;padding:8px 14px;display:flex;align-items:center;gap:12px;min-width:200px;position:relative;}
.hero-card .hero-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hero-card .hero-info{flex:1;}
.hero-card .hero-name{font-family:'Cinzel',serif;font-size:12px;color:#b8a8d0;margin-bottom:4px;}
.hero-card .hp-bar{height:6px;background:#1a1530;border-radius:3px;overflow:hidden;margin-bottom:3px;}
.hero-card .hp-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.hero-card .hero-status{font-size:11px;color:#6a6280;font-style:italic;}
.hero-card.exploring{border-color:#3a5a80;}
.hero-card.idle{border-color:#2a4a2a;}
.hero-card.dead{border-color:#5a2a2a;opacity:0.6;}
.hero-card .exp-timer{font-family:'Cinzel',serif;font-size:18px;color:#80b0e0;position:absolute;right:14px;top:50%;transform:translateY(-50%);}
.recruit-btn{background:#1a1530;border:1px dashed #3a2d6a;border-radius:6px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#7b6fa0;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.recruit-btn:hover{background:#1e1840;border-color:#5a45a0;color:#b8a8e0;}
.recruit-btn:disabled{opacity:0.3;cursor:not-allowed;}
.recruit-cost{color:#ffd700;font-size:11px;}

/* Zone Tooltip */
.zone-tooltip{position:absolute;background:#1a1530;border:1px solid #3a2d6a;border-radius:6px;padding:10px 14px;pointer-events:none;z-index:100;font-size:12px;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,0.6);}
.zone-tooltip h4{font-family:'Cinzel',serif;color:#c4a44a;margin-bottom:4px;font-size:13px;}
.zone-tooltip .zt-row{display:flex;justify-content:space-between;margin:2px 0;color:#a898c8;}

/* Notifications */
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a2530;border:1px solid #2a5a6a;border-radius:6px;padding:10px 24px;font-family:'Cinzel',serif;font-size:14px;color:#80d0e0;z-index:200;animation:notifIn 0.3s ease,notifOut 0.3s ease 2.5s forwards;pointer-events:none;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.notif.potion-found{background:#1a1530;border-color:#6a45b0;color:#c8a0f0;box-shadow:0 0 25px rgba(100,50,180,0.3);}
.notif.gold-earned{color:#ffd700;border-color:#6a5a20;}
.notif.hero-died{background:#2a1515;border-color:#6a2020;color:#e08080;}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes notifOut{from{opacity:1;}to{opacity:0;}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a0818;}
::-webkit-scrollbar-thumb{background:#2a2245;border-radius:2px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// GAME DATA & CONSTANTS
// ═══════════════════════════════════════════════
const ZONES = [
  { id:0, name:'Verdant Meadow', tier:'D', color:0x4a9e4a, colorCSS:'#4a9e4a', duration:5, hpCost:10,
    ingredients:['Moonpetal','Dewmoss','River Clay','Copper Dust','Nightberry'], rarity:'common' },
  { id:1, name:'Misty Marsh', tier:'C', color:0x4a7a9e, colorCSS:'#4a7a9e', duration:10, hpCost:30,
    ingredients:['Crimson Lichen','Fog Essence','Iron Filing','Stoneroot','Amber Sap'], rarity:'rare' },
  { id:2, name:'Crystal Cavern', tier:'B', color:0xb8860b, colorCSS:'#b8860b', duration:18, hpCost:55,
    ingredients:['Crystal Shard','Drake Moss','Sulfur Bloom','Shadow Silk','Venom Drop'], rarity:'rare' },
  { id:3, name:'Volcanic Ridge', tier:'A', color:0x9e4a4a, colorCSS:'#9e4a4a', duration:28, hpCost:75,
    ingredients:['Phoenix Ash','Void Salt','Starlight Dew','Obsidian Flake','Spirit Vine'], rarity:'epic' },
  { id:4, name:'Aether Spire', tier:'S', color:0x9e4a9e, colorCSS:'#9e4a9e', duration:40, hpCost:95,
    ingredients:['Dragon Scale','Aether Core','Titan Blood','Celestial Dust','Abyssal Pearl'], rarity:'epic' },
];

const ALL_INGREDIENTS = ZONES.flatMap(z => z.ingredients);
const INGREDIENT_ZONE = {};
const INGREDIENT_TIER = {};
ALL_INGREDIENTS.forEach((ing, i) => {
  const zoneIdx = Math.floor(i / 5);
  INGREDIENT_ZONE[ing] = zoneIdx;
  INGREDIENT_TIER[ing] = ZONES[zoneIdx].rarity;
});

const POTION_ADJECTIVES = ['Luminous','Shadow','Crystal','Ember','Frost','Void','Celestial','Ancient','Mystic','Storm','Crimson','Azure','Golden','Silver','Verdant','Obsidian','Ethereal','Arcane','Primal','Astral','Infernal','Radiant','Twilight','Phantom','Spectral','Abyssal','Divine','Feral','Molten','Glacial'];
const POTION_NOUNS = ['Elixir','Tonic','Brew','Draught','Philter','Essence','Tincture','Serum','Nectar','Cordial','Mixture','Solution','Potion','Balm','Salve','Infusion','Concentrate','Decoction','Distillate','Remedy'];

const HERO_NAMES = ['Alaric','Brynn','Cassiel'];
const HERO_COST = [0, 60, 180];
const MAX_HEROES = 3;
const HERO_MAX_HP = 100;
const HERO_REGEN = 4; // HP per second when idle
const GOLD_PER_EXPEDITION_BASE = 8;
const GOLD_PER_POTION = 20;
const TOTAL_POTIONS = 30;

// ═══════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// ═══════════════════════════════════════════════
// RECIPE GENERATOR
// ═══════════════════════════════════════════════
function generateRecipes(seed) {
  const rng = mulberry32(seed);
  const recipes = [];
  const usedCombos = new Set();

  function comboKey(ings) { return ings.slice().sort().join('|'); }
  function randFrom(arr) { return arr[Math.floor(rng() * arr.length)]; }
  function randFromZone(zoneIdx) { return ZONES[zoneIdx].ingredients[Math.floor(rng() * 5)]; }

  // Generate potion names
  const potionNames = [];
  const usedNames = new Set();
  for (let i = 0; i < TOTAL_POTIONS; i++) {
    let name;
    do { name = POTION_ADJECTIVES[Math.floor(rng() * POTION_ADJECTIVES.length)] + ' ' +
                POTION_NOUNS[Math.floor(rng() * POTION_NOUNS.length)];
    } while (usedNames.has(name));
    usedNames.add(name);
    potionNames.push(name);
  }

  // Ensure each zone has pinned recipes (at least 2 per zone)
  let potionIdx = 0;
  for (let z = 0; z < 5; z++) {
    const count = z < 3 ? 3 : 2; // more recipes for easier zones
    for (let r = 0; r < count; r++) {
      const pinned = randFromZone(z);
      let other;
      // pick second ingredient from any zone <= current + 1
      const maxZone = Math.min(z + 1, 4);
      do { other = randFromZone(Math.floor(rng() * (maxZone + 1))); } while (other === pinned);
      const key = comboKey([pinned, other]);
      if (!usedCombos.has(key)) {
        usedCombos.add(key);
        recipes.push({ id: potionIdx, name: potionNames[potionIdx], ingredients: [pinned, other].sort(), size: 2 });
        potionIdx++;
      }
    }
  }

  // Fill remaining 2-ingredient recipes
  while (potionIdx < 22 && potionIdx < TOTAL_POTIONS) {
    const a = randFrom(ALL_INGREDIENTS);
    let b; do { b = randFrom(ALL_INGREDIENTS); } while (b === a);
    const key = comboKey([a, b]);
    if (!usedCombos.has(key)) {
      usedCombos.add(key);
      recipes.push({ id: potionIdx, name: potionNames[potionIdx], ingredients: [a, b].sort(), size: 2 });
      potionIdx++;
    }
  }

  // 3-ingredient recipes
  while (potionIdx < 28 && potionIdx < TOTAL_POTIONS) {
    const a = randFrom(ALL_INGREDIENTS);
    let b; do { b = randFrom(ALL_INGREDIENTS); } while (b === a);
    let c; do { c = randFrom(ALL_INGREDIENTS); } while (c === a || c === b);
    const key = comboKey([a, b, c]);
    if (!usedCombos.has(key)) {
      usedCombos.add(key);
      recipes.push({ id: potionIdx, name: potionNames[potionIdx], ingredients: [a, b, c].sort(), size: 3 });
      potionIdx++;
    }
  }

  // 4-ingredient recipes (rare, require high tier)
  while (potionIdx < TOTAL_POTIONS) {
    const pinned = randFromZone(3 + Math.floor(rng() * 2)); // zone A or S
    const a = randFrom(ALL_INGREDIENTS);
    let b; do { b = randFrom(ALL_INGREDIENTS); } while (b === a || b === pinned);
    let c; do { c = randFrom(ALL_INGREDIENTS); } while (c === a || c === b || c === pinned);
    const ings = [pinned, a, b, c];
    const key = comboKey(ings);
    if (!usedCombos.has(key)) {
      usedCombos.add(key);
      recipes.push({ id: potionIdx, name: potionNames[potionIdx], ingredients: ings.sort(), size: ings.length });
      potionIdx++;
    }
  }

  return recipes.slice(0, TOTAL_POTIONS);
}

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
const SESSION_SEED = Math.floor(Math.random() * 2147483647);
const RECIPES = generateRecipes(SESSION_SEED);

function createInitialState() {
  return {
    gold: 0,
    heroes: [{ id: 0, name: HERO_NAMES[0], hp: HERO_MAX_HP, status: 'idle', zoneId: null, expStart: 0, expEnd: 0, cooldownEnd: 0 }],
    inventory: {},
    discovered: [], // array of recipe ids
    testedCombos: new Set(),
    craftSlots: ['', '', '', ''],
    craftResult: null, // {type:'success'|'fail', text:'...'}
    notifications: [],
    sessionStart: Date.now(),
    won: false,
  };
}

// ═══════════════════════════════════════════════
// PHASER SCENE
// ═══════════════════════════════════════════════
let phaserScene = null;

class AlchemistScene extends Phaser.Scene {
  constructor() { super({ key: 'AlchemistScene' }); }

  create() {
    phaserScene = this;
    this.zoneNodes = [];
    this.heroSprites = [];
    this.particles = [];

    const w = this.scale.width;
    const h = this.scale.height;

    // Starfield background
    for (let i = 0; i < 60; i++) {
      const star = this.add.circle(
        Math.random() * w, Math.random() * h,
        Math.random() * 1.5 + 0.3, 0xffffff, Math.random() * 0.4 + 0.1
      );
      this.tweens.add({ targets: star, alpha: { from: star.alpha, to: star.alpha * 0.3 },
        duration: 2000 + Math.random() * 3000, yoyo: true, repeat: -1 });
    }

    // Zone positions in arc
    const cx = w / 2, cy = h / 2 + 20;
    const rx = w * 0.35, ry = h * 0.35;
    const zonePositions = [
      { x: cx - rx * 0.8, y: cy + ry * 0.5 },
      { x: cx - rx * 0.5, y: cy - ry * 0.15 },
      { x: cx, y: cy - ry * 0.6 },
      { x: cx + rx * 0.5, y: cy - ry * 0.15 },
      { x: cx + rx * 0.8, y: cy + ry * 0.5 },
    ];

    // Draw zone connections
    const gfx = this.add.graphics();
    gfx.lineStyle(1, 0x1e1a30, 0.5);
    for (let i = 0; i < 4; i++) {
      gfx.lineBetween(zonePositions[i].x, zonePositions[i].y, zonePositions[i+1].x, zonePositions[i+1].y);
    }

    // Zone nodes
    ZONES.forEach((zone, i) => {
      const pos = zonePositions[i];
      const radius = 32;

      // Glow
      const glow = this.add.circle(pos.x, pos.y, radius + 8, zone.color, 0.08);
      this.tweens.add({ targets: glow, scaleX: 1.15, scaleY: 1.15, alpha: 0.03,
        duration: 2000 + i * 300, yoyo: true, repeat: -1 });

      // Main circle
      const circle = this.add.circle(pos.x, pos.y, radius, 0x13101e, 1);
      circle.setStrokeStyle(2, zone.color, 0.7);

      // Tier label
      this.add.text(pos.x, pos.y - 6, zone.tier, {
        fontFamily: 'Cinzel', fontSize: '18px', color: '#' + zone.color.toString(16).padStart(6, '0'),
        fontStyle: 'bold'
      }).setOrigin(0.5);

      // Zone name
      this.add.text(pos.x, pos.y + 14, zone.name, {
        fontFamily: 'Crimson Text', fontSize: '10px', color: '#6a6280'
      }).setOrigin(0.5);

      // Duration
      this.add.text(pos.x, pos.y + radius + 16, zone.duration + 's', {
        fontFamily: 'Crimson Text', fontSize: '10px', color: '#4a4560'
      }).setOrigin(0.5);

      // Progress arc (initially invisible)
      const progressArc = this.add.graphics();

      this.zoneNodes.push({ ...pos, radius, circle, glow, progressArc, zoneId: i });
    });

    // Hero sprites (will be created dynamically)
    this.heroGroup = this.add.group();
  }

  update() {
    if (!window.__gameState) return;
    const state = window.__gameState;
    const now = Date.now();

    // Update hero sprites
    while (this.heroSprites.length < state.heroes.length) {
      const idx = this.heroSprites.length;
      const colors = [0x80d0e0, 0xe0c080, 0xe080a0];
      const homeX = 60 + idx * 50;
      const homeY = this.scale.height - 30;
      const sprite = this.add.circle(homeX, homeY, 8, colors[idx], 0.9);
      sprite.setStrokeStyle(2, 0xffffff, 0.3);
      const nameLabel = this.add.text(homeX, homeY - 14, HERO_NAMES[idx], {
        fontFamily: 'Cinzel', fontSize: '8px', color: '#8888aa'
      }).setOrigin(0.5);
      this.heroSprites.push({ sprite, nameLabel, homeX, homeY, targetX: homeX, targetY: homeY, animating: false });
    }

    state.heroes.forEach((hero, i) => {
      const hs = this.heroSprites[i];
      if (!hs) return;

      if (hero.status === 'exploring' && hero.zoneId !== null) {
        const zn = this.zoneNodes[hero.zoneId];
        hs.targetX = zn.x + (i - 1) * 12;
        hs.targetY = zn.y + zn.radius + 6;

        // Draw progress arc
        const progress = Math.min(1, (now - hero.expStart) / (hero.expEnd - hero.expStart));
        zn.progressArc.clear();
        zn.progressArc.lineStyle(3, ZONES[hero.zoneId].color, 0.6);
        zn.progressArc.beginPath();
        zn.progressArc.arc(zn.x, zn.y, zn.radius + 4, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * progress, false);
        zn.progressArc.strokePath();
      } else {
        hs.targetX = hs.homeX;
        hs.targetY = hs.homeY;
        // Clear any progress arcs
        this.zoneNodes.forEach(zn => {
          const anyExploring = state.heroes.some(h => h.status === 'exploring' && h.zoneId === zn.zoneId);
          if (!anyExploring) zn.progressArc.clear();
        });
      }

      // Smooth movement
      hs.sprite.x += (hs.targetX - hs.sprite.x) * 0.08;
      hs.sprite.y += (hs.targetY - hs.sprite.y) * 0.08;
      hs.nameLabel.x = hs.sprite.x;
      hs.nameLabel.y = hs.sprite.y - 14;

      // Opacity based on status
      hs.sprite.setAlpha(hero.status === 'dead' ? 0.3 : hero.status === 'cooldown' ? 0.5 : 0.9);
    });
  }

  burstParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, 3, color, 0.8);
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 40;
      this.tweens.add({
        targets: p, x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist,
        alpha: 0, scale: 0.1, duration: 600 + Math.random() * 400,
        onComplete: () => p.destroy()
      });
    }
  }
}

// ═══════════════════════════════════════════════
// REACT APP
// ═══════════════════════════════════════════════
const h = React.createElement;
const { useState, useEffect, useRef, useCallback } = React;

function App() {
  const [state, setState] = useState(createInitialState);
  const [now, setNow] = useState(Date.now());
  const [hoveredZone, setHoveredZone] = useState(null);
  const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
  const phaserRef = useRef(null);
  const centerRef = useRef(null);
  const notifIdRef = useRef(0);

  // Expose state for Phaser
  window.__gameState = state;

  // Game tick
  useEffect(() => {
    const interval = setInterval(() => {
      const t = Date.now();
      setNow(t);
      setState(prev => {
        if (prev.won) return prev;
        let changed = false;
        const heroes = prev.heroes.map(hero => {
          if (hero.status === 'exploring' && t >= hero.expEnd) {
            changed = true;
            return resolveExpedition(hero, prev);
          }
          if (hero.status === 'cooldown' && t >= hero.cooldownEnd) {
            changed = true;
            return { ...hero, status: 'idle', hp: HERO_MAX_HP };
          }
          if (hero.status === 'idle' && hero.hp < HERO_MAX_HP) {
            changed = true;
            return { ...hero, hp: Math.min(HERO_MAX_HP, hero.hp + HERO_REGEN * 0.1) };
          }
          return hero;
        });
        if (!changed) return prev;

        // Collect expedition rewards
        let newGold = prev.gold;
        let newInv = { ...prev.inventory };
        let newNotifs = [...prev.notifications];
        heroes.forEach((hero, i) => {
          if (hero._rewards) {
            hero._rewards.ingredients.forEach(ing => {
              newInv[ing] = (newInv[ing] || 0) + hero._rewards.ingredientAmounts[ing];
            });
            newGold += hero._rewards.gold;
            if (hero._rewards.gold > 0) {
              newNotifs.push({ id: ++notifIdRef.current, type: 'gold-earned', text: '+' + hero._rewards.gold + ' gold from ' + ZONES[hero._rewards.zoneId].name, time: t });
            }
            if (hero._died) {
              newNotifs.push({ id: ++notifIdRef.current, type: 'hero-died', text: hero.name + ' fell in ' + ZONES[hero._rewards.zoneId].name + '!', time: t });
            }
            delete hero._rewards;
            delete hero._died;

            // Phaser burst
            if (phaserScene && hero._burstZone !== undefined) {
              const zn = phaserScene.zoneNodes[hero._burstZone];
              phaserScene.burstParticles(zn.x, zn.y, hero._died ? 0xff4444 : ZONES[hero._burstZone].color, 15);
              delete hero._burstZone;
            }
          }
        });

        // Clean old notifs
        newNotifs = newNotifs.filter(n => t - n.time < 3000);

        return { ...prev, heroes, gold: newGold, inventory: newInv, notifications: newNotifs };
      });
    }, 100);
    return () => clearInterval(interval);
  }, []);

  function resolveExpedition(hero, gameState) {
    const zone = ZONES[hero.zoneId];
    const rng = mulberry32(SESSION_SEED + hero.id * 1000 + hero.expStart);

    // Check survival
    const survived = hero.hp > zone.hpCost;
    if (!survived) {
      return {
        ...hero, status: 'cooldown', zoneId: null, hp: 0,
        cooldownEnd: Date.now() + 8000,
        _rewards: { ingredients: [], ingredientAmounts: {}, gold: 0, zoneId: hero.zoneId },
        _died: true, _burstZone: hero.zoneId,
      };
    }

    // Generate loot
    const ingredients = [];
    const ingredientAmounts = {};
    const numDrops = 2 + Math.floor(rng() * 3); // 2-4 ingredients
    for (let i = 0; i < numDrops; i++) {
      const ing = zone.ingredients[Math.floor(rng() * zone.ingredients.length)];
      if (!ingredientAmounts[ing]) { ingredients.push(ing); ingredientAmounts[ing] = 0; }
      ingredientAmounts[ing] += 1 + Math.floor(rng() * 2);
    }

    const goldDrop = GOLD_PER_EXPEDITION_BASE + Math.floor(rng() * (zone.id + 1) * 5);

    return {
      ...hero, status: 'idle', zoneId: null, hp: hero.hp - zone.hpCost,
      _rewards: { ingredients, ingredientAmounts, gold: goldDrop, zoneId: zone.id },
      _burstZone: zone.id,
    };
  }

  function sendExpedition(heroId, zoneId) {
    setState(prev => {
      const hero = prev.heroes[heroId];
      if (!hero || hero.status !== 'idle') return prev;
      const zone = ZONES[zoneId];
      if (hero.hp <= zone.hpCost) return prev; // would die
      const heroes = prev.heroes.map(h =>
        h.id === heroId ? { ...h, status: 'exploring', zoneId, expStart: Date.now(), expEnd: Date.now() + zone.duration * 1000 } : h
      );
      return { ...prev, heroes };
    });
  }

  function craftPotion() {
    setState(prev => {
      const slots = prev.craftSlots.filter(s => s !== '');
      if (slots.length < 2) return { ...prev, craftResult: { type: 'fail', text: 'Need at least 2 ingredients' } };

      // Check inventory
      const needed = {};
      slots.forEach(s => { needed[s] = (needed[s] || 0) + 1; });
      for (const [ing, count] of Object.entries(needed)) {
        if ((prev.inventory[ing] || 0) < count) {
          return { ...prev, craftResult: { type: 'fail', text: 'Not enough ' + ing } };
        }
      }

      // Consume ingredients
      const newInv = { ...prev.inventory };
      for (const [ing, count] of Object.entries(needed)) {
        newInv[ing] -= count;
        if (newInv[ing] <= 0) delete newInv[ing];
      }

      // Check recipes
      const comboKey = slots.slice().sort().join('|');
      const testedCombos = new Set(prev.testedCombos);
      testedCombos.add(comboKey);

      const matchedRecipe = RECIPES.find(r =>
        r.ingredients.join('|') === comboKey && !prev.discovered.includes(r.id)
      );

      if (matchedRecipe) {
        const discovered = [...prev.discovered, matchedRecipe.id];
        const won = discovered.length >= TOTAL_POTIONS;
        const newNotifs = [...prev.notifications, {
          id: ++notifIdRef.current, type: 'potion-found',
          text: 'Discovered: ' + matchedRecipe.name + '!', time: Date.now()
        }];
        if (phaserScene) {
          const cx = phaserScene.scale.width / 2;
          const cy = phaserScene.scale.height / 2;
          phaserScene.burstParticles(cx, cy, 0xc4a44a, 25);
        }
        return {
          ...prev, inventory: newInv, discovered, testedCombos,
          gold: prev.gold + GOLD_PER_POTION, notifications: newNotifs, won,
          craftResult: { type: 'success', text: matchedRecipe.name + ' (+' + GOLD_PER_POTION + 'g)' },
        };
      }

      // Progressive probability: chance to discover random potion
      const remaining = TOTAL_POTIONS - prev.discovered.length;
      const totalPossibleCombos = 625; // rough estimate
      const tested = testedCombos.size;
      const progressiveChance = Math.min(0.5, remaining / Math.max(1, totalPossibleCombos - tested) * 3);

      const roll = mulberry32(SESSION_SEED + tested * 7 + Date.now() % 10000)();
      if (roll < progressiveChance && remaining > 0) {
        const undiscovered = RECIPES.filter(r => !prev.discovered.includes(r.id));
        const lucky = undiscovered[Math.floor(roll / progressiveChance * undiscovered.length)];
        if (lucky) {
          const discovered = [...prev.discovered, lucky.id];
          const won = discovered.length >= TOTAL_POTIONS;
          const newNotifs = [...prev.notifications, {
            id: ++notifIdRef.current, type: 'potion-found',
            text: 'Lucky discovery: ' + lucky.name + '!', time: Date.now()
          }];
          return {
            ...prev, inventory: newInv, discovered, testedCombos,
            gold: prev.gold + GOLD_PER_POTION, notifications: newNotifs, won,
            craftResult: { type: 'success', text: 'Lucky! ' + lucky.name + ' (+' + GOLD_PER_POTION + 'g)' },
          };
        }
      }

      return { ...prev, inventory: newInv, testedCombos, craftResult: { type: 'fail', text: 'Nothing happened... ingredients lost.' } };
    });
  }

  function recruitHero() {
    setState(prev => {
      const idx = prev.heroes.length;
      if (idx >= MAX_HEROES) return prev;
      const cost = HERO_COST[idx];
      if (prev.gold < cost) return prev;
      const newHero = { id: idx, name: HERO_NAMES[idx], hp: HERO_MAX_HP, status: 'idle', zoneId: null, expStart: 0, expEnd: 0, cooldownEnd: 0 };
      return { ...prev, gold: prev.gold - cost, heroes: [...prev.heroes, newHero] };
    });
  }

  function setCraftSlot(slotIdx, value) {
    setState(prev => {
      const slots = [...prev.craftSlots];
      slots[slotIdx] = value;
      return { ...prev, craftSlots: slots, craftResult: null };
    });
  }

  // Init Phaser
  useEffect(() => {
    if (!centerRef.current || phaserRef.current) return;
    const rect = centerRef.current.getBoundingClientRect();
    phaserRef.current = new Phaser.Game({
      type: Phaser.AUTO,
      parent: centerRef.current,
      width: rect.width,
      height: rect.height,
      backgroundColor: '#08070f',
      scene: AlchemistScene,
      scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    });
    return () => { if (phaserRef.current) phaserRef.current.destroy(true); };
  }, []);

  // Zone click handling via overlay
  const idleHeroes = state.heroes.filter(hr => hr.status === 'idle');
  const availableIngs = Object.entries(state.inventory).filter(([_, c]) => c > 0);

  // Elapsed time
  const elapsed = Math.floor((now - state.sessionStart) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;

  return h('div', { id: 'game-root', style: { display: 'contents' } },

    // Top Bar
    h('div', { className: 'topbar' },
      h('div', { className: 'gold' }, h('span', null, '\u2728'), Math.floor(state.gold) + ' gold'),
      h('h1', null, 'ALCHEMIST'),
      h('div', { style: { display: 'flex', gap: '20px', alignItems: 'center' } },
        h('div', { className: 'grimoire-progress' }, '\uD83D\uDCD6 ' + state.discovered.length + '/' + TOTAL_POTIONS),
        h('div', { className: 'session-info' }, String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0')),
      ),
    ),

    // Left - Grimoire
    h('div', { className: 'grimoire-panel' },
      h('h2', null, 'Grimoire'),
      h('div', { className: 'grimoire-grid' },
        RECIPES.map((recipe, i) => {
          const isDiscovered = state.discovered.includes(recipe.id);
          const justFound = isDiscovered && state.discovered.indexOf(recipe.id) === state.discovered.length - 1 && now - state.sessionStart < 999999;
          return h('div', {
            key: i,
            className: 'grimoire-slot ' + (isDiscovered ? 'discovered' : 'unknown') + (justFound ? ' just-found' : ''),
            title: isDiscovered ? recipe.ingredients.join(' + ') : '???',
          }, isDiscovered ? recipe.name : '????');
        })
      ),
    ),

    // Center - Phaser + Zone Overlays
    h('div', { className: 'center-area', ref: centerRef,
      onMouseMove: (e) => setMousePos({ x: e.clientX, y: e.clientY })
    },
      // Zone click overlays
      phaserScene ? ZONES.map((zone, i) => {
        const zn = phaserScene.zoneNodes[i];
        if (!zn) return null;
        const canvas = centerRef.current;
        if (!canvas) return null;
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / phaserScene.scale.width;
        const scaleY = rect.height / phaserScene.scale.height;
        const left = zn.x * scaleX - 36;
        const top = zn.y * scaleY - 36;
        return h('div', {
          key: 'zone-' + i,
          style: {
            position: 'absolute', left: left + 'px', top: top + 'px',
            width: '72px', height: '72px', borderRadius: '50%', cursor: 'pointer', zIndex: 10,
          },
          onClick: () => {
            if (idleHeroes.length > 0) {
              const bestHero = idleHeroes.find(hr => hr.hp > zone.hpCost) || idleHeroes[0];
              if (bestHero && bestHero.hp > zone.hpCost) {
                sendExpedition(bestHero.id, i);
              }
            }
          },
          onMouseEnter: () => setHoveredZone(i),
          onMouseLeave: () => setHoveredZone(null),
        });
      }) : null,

      // Zone tooltip
      hoveredZone !== null ? h('div', {
        className: 'zone-tooltip',
        style: { left: (mousePos.x - 220 + 20) + 'px', top: (mousePos.y - 56 - 10) + 'px', position: 'fixed' }
      },
        h('h4', null, ZONES[hoveredZone].tier + ' — ' + ZONES[hoveredZone].name),
        h('div', { className: 'zt-row' }, h('span', null, 'Duration'), h('span', null, ZONES[hoveredZone].duration + 's')),
        h('div', { className: 'zt-row' }, h('span', null, 'HP Cost'), h('span', null, ZONES[hoveredZone].hpCost)),
        h('div', { className: 'zt-row' }, h('span', null, 'Rarity'), h('span', null, ZONES[hoveredZone].rarity)),
        h('div', { style: { marginTop: '6px', fontSize: '11px', color: '#6a6280' } },
          ZONES[hoveredZone].ingredients.join(', ')
        ),
        idleHeroes.length > 0
          ? h('div', { style: { marginTop: '6px', fontSize: '11px', color: '#80d0a0' } }, 'Click to send ' + idleHeroes.find(hr => hr.hp > ZONES[hoveredZone].hpCost)?.name || 'hero')
          : h('div', { style: { marginTop: '6px', fontSize: '11px', color: '#e08080' } }, 'No available heroes'),
      ) : null,

      // Win overlay
      state.won ? h('div', {
        style: {
          position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(10,8,20,0.9)', display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', zIndex: 100,
        }
      },
        h('div', { style: { fontFamily: 'Cinzel', fontSize: '36px', color: '#c4a44a', marginBottom: '12px', textShadow: '0 0 30px rgba(196,164,74,0.5)' } }, 'GRIMOIRE COMPLETE'),
        h('div', { style: { fontFamily: 'Crimson Text', fontSize: '18px', color: '#b8a8d0', marginBottom: '8px' } },
          'All ' + TOTAL_POTIONS + ' potions discovered in ' + minutes + 'm ' + seconds + 's'),
        h('div', { style: { fontFamily: 'Crimson Text', fontSize: '16px', color: '#ffd700' } },
          'Gold earned: ' + Math.floor(state.gold)),
        h('button', {
          style: {
            marginTop: '24px', padding: '10px 30px', fontFamily: 'Cinzel', fontSize: '14px',
            background: 'linear-gradient(135deg,#3a2580,#5a35a0)', color: '#e8dcc0',
            border: '1px solid #6a45b0', borderRadius: '5px', cursor: 'pointer', letterSpacing: '2px',
          },
          onClick: () => { setState(createInitialState()); }
        }, 'NEW SESSION'),
      ) : null,
    ),

    // Right - Crafting + Inventory
    h('div', { className: 'craft-panel' },
      h('h2', null, 'Cauldron'),
      h('div', { className: 'craft-slots' },
        [0, 1, 2, 3].map(i =>
          h('div', { key: i, className: 'craft-slot' },
            h('select', {
              value: state.craftSlots[i],
              onChange: (e) => setCraftSlot(i, e.target.value),
            },
              h('option', { value: '' }, i < 2 ? 'Slot ' + (i + 1) + ' *' : 'Slot ' + (i + 1) + ' (opt)'),
              availableIngs.map(([ing, count]) =>
                h('option', { key: ing, value: ing }, ing + ' (' + count + ')')
              ),
            ),
          )
        ),
      ),
      h('button', {
        className: 'craft-btn',
        disabled: state.craftSlots.filter(s => s !== '').length < 2,
        onClick: craftPotion,
      }, '\u2697\uFE0F  Brew'),
      h('div', {
        className: 'craft-result ' + (state.craftResult ? state.craftResult.type : 'empty'),
      }, state.craftResult ? state.craftResult.text : 'Select ingredients and brew...'),

      h('div', { className: 'inv-section' },
        h('h3', null, 'Inventory'),
        h('div', { className: 'inv-grid' },
          availableIngs.length === 0
            ? h('div', { style: { fontSize: '12px', color: '#3a3555', fontStyle: 'italic', padding: '4px' } }, 'No ingredients yet. Explore!')
            : availableIngs.map(([ing, count]) =>
                h('div', { key: ing, className: 'inv-item tier-' + INGREDIENT_TIER[ing] },
                  h('span', { className: 'name' }, ing),
                  h('span', { className: 'count' }, 'x' + count),
                )
              ),
        ),
      ),

      h('div', { style: { marginTop: '8px', fontSize: '11px', color: '#3a3555', borderTop: '1px solid #1e1a30', paddingTop: '8px' } },
        'Tested: ' + state.testedCombos.size + ' combos',
        h('br'),
        'Recipes: 2-4 ingredients',
      ),
    ),

    // Bottom - Heroes
    h('div', { className: 'hero-bar' },
      state.heroes.map(hero => {
        const isExploring = hero.status === 'exploring';
        const timeLeft = isExploring ? Math.max(0, Math.ceil((hero.expEnd - now) / 1000)) : 0;
        const hpPct = Math.max(0, hero.hp / HERO_MAX_HP * 100);
        const hpColor = hpPct > 60 ? '#4a9e4a' : hpPct > 30 ? '#c4a44a' : '#9e4a4a';

        return h('div', { key: hero.id, className: 'hero-card ' + hero.status },
          h('div', { className: 'hero-icon', style: {
            background: hero.status === 'dead' || hero.status === 'cooldown'
              ? 'linear-gradient(135deg,#3a1a1a,#2a1515)'
              : 'linear-gradient(135deg,#1a2040,#2a1a50)',
            border: '2px solid ' + (hero.status === 'exploring' ? '#4a7a9e' : hero.status === 'cooldown' ? '#6a3030' : '#2a4a2a'),
          }}, '\u2694\uFE0F'),
          h('div', { className: 'hero-info' },
            h('div', { className: 'hero-name' }, hero.name),
            h('div', { className: 'hp-bar' },
              h('div', { className: 'hp-fill', style: { width: hpPct + '%', background: hpColor } }),
            ),
            h('div', { className: 'hero-status' },
              hero.status === 'exploring' ? 'Exploring ' + ZONES[hero.zoneId].name :
              hero.status === 'cooldown' ? 'Recovering... ' + Math.ceil((hero.cooldownEnd - now) / 1000) + 's' :
              hero.hp < HERO_MAX_HP ? 'Resting (' + Math.floor(hero.hp) + ' HP)' :
              'Ready'
            ),
          ),
          isExploring ? h('div', { className: 'exp-timer' }, timeLeft + 's') : null,
        );
      }),

      // Recruit button
      state.heroes.length < MAX_HEROES ? h('button', {
        className: 'recruit-btn',
        disabled: state.gold < HERO_COST[state.heroes.length],
        onClick: recruitHero,
      },
        '+ Recruit ',
        h('span', { className: 'recruit-cost' }, HERO_COST[state.heroes.length] + 'g'),
      ) : null,

      // Quick zone buttons for mobile / convenience
      h('div', { style: { marginLeft: 'auto', display: 'flex', gap: '6px', alignItems: 'center' } },
        h('span', { style: { fontSize: '11px', color: '#4a4560', marginRight: '4px' } }, 'Quick:'),
        ZONES.map(zone =>
          h('button', {
            key: zone.id,
            style: {
              padding: '4px 10px', fontSize: '11px', fontFamily: 'Cinzel',
              background: '#13101e', border: '1px solid ' + zone.colorCSS, borderRadius: '4px',
              color: zone.colorCSS, cursor: 'pointer', opacity: idleHeroes.some(hr => hr.hp > zone.hpCost) ? 1 : 0.3,
            },
            disabled: !idleHeroes.some(hr => hr.hp > zone.hpCost),
            onClick: () => {
              const bestHero = idleHeroes.find(hr => hr.hp > zone.hpCost);
              if (bestHero) sendExpedition(bestHero.id, zone.id);
            },
          }, zone.tier)
        ),
      ),
    ),

    // Notifications
    state.notifications.filter(n => now - n.time < 3000).map(n =>
      h('div', { key: n.id, className: 'notif ' + n.type }, n.text)
    ),
  );
}

// Mount
ReactDOM.render(h(App), document.getElementById('app'));
</script>
</body>
</html>
